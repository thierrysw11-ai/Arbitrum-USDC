<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#050812"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <marker id="arrowWrite" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f59e0b"/>
    </marker>
  </defs>

  <rect width="900" height="460" fill="url(#bg)" rx="12"/>

  <!-- Left: On-chain -->
  <g transform="translate(40,70)">
    <rect width="220" height="100" rx="10" fill="#0f172a" stroke="#1e293b"/>
    <text x="110" y="30" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="700" letter-spacing="2">ARBITRUM ONE</text>
    <text x="110" y="60" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="700">USDC Token</text>
    <text x="110" y="80" text-anchor="middle" fill="#64748b" font-size="10" font-family="ui-monospace, monospace">0xaf88…5831</text>

    <rect y="150" width="220" height="100" rx="10" fill="#0f172a" stroke="#1e293b"/>
    <text x="110" y="180" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="700" letter-spacing="2">ARBITRUM ONE</text>
    <text x="110" y="210" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="700">Aave V3 Pool</text>
    <text x="110" y="230" text-anchor="middle" fill="#64748b" font-size="10" font-family="ui-monospace, monospace">0x794a…14aD</text>
  </g>

  <!-- Middle: Indexing -->
  <g transform="translate(340,100)">
    <rect width="220" height="140" rx="10" fill="#0f172a" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="110" y="30" text-anchor="middle" fill="#60a5fa" font-size="10" font-weight="700" letter-spacing="2">THE GRAPH</text>
    <text x="110" y="60" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="700">USDC Subgraph</text>
    <text x="110" y="84" text-anchor="middle" fill="#64748b" font-size="11">indexes Transfer(from, to, value)</text>
    <text x="110" y="104" text-anchor="middle" fill="#64748b" font-size="11">+ HourlyVolume aggregate</text>
    <text x="110" y="122" text-anchor="middle" fill="#64748b" font-size="11">GraphQL endpoint</text>
  </g>

  <!-- Right: Frontend -->
  <g transform="translate(640,60)">
    <rect width="220" height="340" rx="10" fill="#0f172a" stroke="#22c55e" stroke-width="1.5"/>
    <text x="110" y="30" text-anchor="middle" fill="#4ade80" font-size="10" font-weight="700" letter-spacing="2">NEXT.JS 14</text>
    <text x="110" y="60" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="700">Arbitrum DeFi Hub</text>

    <line x1="20" y1="80" x2="200" y2="80" stroke="#1e293b"/>

    <text x="24" y="105" fill="#94a3b8" font-size="11" font-weight="600">LiquidityFlow</text>
    <text x="24" y="122" fill="#64748b" font-size="10">Apollo → HourlyVolume</text>

    <text x="24" y="150" fill="#94a3b8" font-size="11" font-weight="600">AaveRiskGauge</text>
    <text x="24" y="167" fill="#64748b" font-size="10">viem → getUserAccountData()</text>

    <text x="24" y="195" fill="#f59e0b" font-size="11" font-weight="600">SendUSDC (/send)</text>
    <text x="24" y="212" fill="#64748b" font-size="10">wagmi → useWriteContract()</text>

    <text x="24" y="240" fill="#94a3b8" font-size="11" font-weight="600">ConnectButton</text>
    <text x="24" y="257" fill="#64748b" font-size="10">wagmi + WalletConnect v2</text>

    <line x1="20" y1="280" x2="200" y2="280" stroke="#1e293b"/>
    <text x="24" y="300" fill="#64748b" font-size="10">Hosted on Vercel</text>
    <text x="24" y="315" fill="#64748b" font-size="10">Tailwind + Recharts</text>
    <text x="24" y="330" fill="#64748b" font-size="10">error / loading / 404 boundaries</text>
  </g>

  <!-- Arrows -->
  <!-- USDC Transfer events -> subgraph -->
  <line x1="262" y1="120" x2="338" y2="140" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="300" y="115" text-anchor="middle" fill="#64748b" font-size="10">events</text>

  <!-- Aave Pool <- viem read from frontend -->
  <line x1="262" y1="250" x2="638" y2="220" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="450" y="228" text-anchor="middle" fill="#64748b" font-size="10">viem read</text>

  <!-- subgraph -> frontend GraphQL -->
  <line x1="562" y1="165" x2="638" y2="160" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="600" y="150" text-anchor="middle" fill="#64748b" font-size="10">GraphQL</text>

  <!-- frontend -> USDC (write) -->
  <line x1="638" y1="255" x2="262" y2="140" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowWrite)"/>
  <text x="460" y="180" text-anchor="middle" fill="#f59e0b" font-size="10" font-weight="600">transfer() write tx</text>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" fill="#e2e8f0" font-size="16" font-weight="800" letter-spacing="1">Arbitrum DeFi Hub · Architecture</text>
</svg>
